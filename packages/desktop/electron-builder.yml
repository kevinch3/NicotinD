# electron-builder config for the NicotinD desktop shell (Task 11).
#
# Staging contract with `scripts/prepare-resources.ts` (Variant B — see its
# header comment and `electron/paths.ts`): that script assembles
# `packages/desktop/resources/` BEFORE electron-builder runs (wired as the
# `dist` script in package.json: `build` -> `stage-icons` ->
# `prepare-resources` -> `electron-builder`). `extraResources` below stages
# that tree verbatim into the packaged app's `process.resourcesPath`:
#
#   resources/bin/bun              -> paths.ts bunBinary()
#   resources/bin/ffmpeg           -> paths.ts ffmpegBinaryPath()
#   resources/backend/src/main.ts  -> paths.ts backendEntry()
#   resources/web                  -> paths.ts webDistPath()
#   resources/icons/<N>x<N>.png    -> paths.ts app/tray iconPath() (from build/icons/)
#
# `files` only needs the *compiled electron main/preload* (`dist/**`, built
# by `tsconfig.electron.json` — see tsconfig.json) since `resources/**`
# travels separately via extraResources, not through the asar-packed app
# bundle.
appId: ar.kevinroberts.nicotind.desktop
productName: NicotinD
copyright: Copyright © Kevin Chavarria
# electron-builder >=26 derives the packaged Linux binary's filename from the
# scoped package.json `name` (`@nicotind/desktop`) when this is unset, then
# rejects the sanitized result (`@nicotinddesktop`) for containing `@` — the
# same scoped-name pitfall as `deb.artifactName` below, now hit one level
# lower and fatal instead of silently wrong. Pin it explicitly.
executableName: NicotinD

directories:
  output: release
  buildResources: build

# Multi-size icon pack generated from the PWA source by
# `scripts/stage-icons.mjs`. electron-builder picks up `<N>x<N>.png` files
# automatically — Linux `.deb` install hooks stage them under
# `/usr/share/icons/hicolor/<N>x<N>/apps/nicotind.png`, the macOS dmg uses
# `512x512` (and `1024x1024` for retina), and the window-level icon falls
# through to `paths.ts appIconPath(platform)` (256x256 typically).
icon: build/icons

files:
  - dist/**
  - package.json
  - '!**/*.map'

extraResources:
  - from: resources
    to: .
    filter:
      - '**/*'

# The backend (spawned via `bun run <entry>`) and the `bin/bun` / `bin/ffmpeg`
# executables must exist as real files on disk — asar can't be exec()'d or
# `bun run`-imported from. extraResources above already lands outside the
# asar (it's copied to the app's resources dir as plain files, not into
# app.asar), so nothing here strictly needs unpacking today; asarUnpack is
# kept as a defensive backstop in case any of these ever end up referenced
# from inside `files`/the asar in a future change.
asarUnpack:
  - resources/backend/**
  - resources/bin/**

# NicotinD talks to its own sidecar over http://127.0.0.1:<port>, never a
# public host — nothing here needs remote code execution properties, so the
# default `compression: normal` / no notarization applies.
compression: normal

linux:
  target:
    - AppImage
    - deb
  category: Audio
  icon: build/icons
  desktop:
    entry:
      Name: NicotinD
      Comment: Unified music acquisition + streaming
      Categories: Audio;Music;Player;AudioVideo;
      StartupNotify: true
      StartupWMClass: NicotinD

deb:
  # electron-builder's default deb artifactName is `${name}_${version}_${arch}.${ext}`,
  # but our package `name` is the scoped `@nicotind/desktop` — fpm reads the `/` as a
  # path separator and tries to write `release/@nicotind/desktop_<v>_amd64.deb`, whose
  # parent dir never exists → `cannot execute … Parent directory does not exist` (the
  # deb step failed the whole desktop-linux release job on v0.1.221/0.1.222). Interpolate
  # `${productName}` (NicotinD) instead so the filename has no slash. The AppImage target
  # already uses `${productName}` by default, so it was unaffected; this matches it.
  artifactName: ${productName}_${version}_${arch}.${ext}
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

mac:
  # arm64 (Apple Silicon) only — the Intel (x64) dmg target was dropped: current
  # Apple hardware is all arm64, and building both doubled macOS CI time (billed
  # at ~10× the Linux rate) and release size. Intel-Mac users build from source.
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.music
  icon: build/icons
  # No Apple Developer ID in scope for v1 (see docs/desktop-app.md), but the
  # build must NOT be fully unsigned: Apple Silicon refuses to execute any
  # unsigned arm64 binary, so a downloaded unsigned dmg reports as
  # "NicotinD is damaged and can't be opened". With no `identity` set (and
  # CSC_IDENTITY_AUTO_DISCOVERY=false in deploy.yml), electron-builder falls
  # back to AD-HOC signing — the app launches, with the normal un-notarized
  # friction (macOS 14: right-click → Open; macOS 15: Privacy & Security →
  # "Open Anyway"). Never set `identity: null` here: that disables even the
  # ad-hoc pass and re-breaks arm64.
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    # The renderer loads the sidecar's http://127.0.0.1:<port> — ATS blocks
    # plaintext HTTP by default. Loopback-only exception (not a blanket
    # NSAllowsArbitraryLoads) since the sidecar never leaves localhost.
    NSAppTransportSecurity:
      NSExceptionDomains:
        localhost:
          NSExceptionAllowsInsecureHTTPLoads: true
          NSIncludesSubdomains: false
        127.0.0.1:
          NSExceptionAllowsInsecureHTTPLoads: true
          NSIncludesSubdomains: false

dmg:
  # Pin the naming pattern explicitly so it stays cohesive with the AppImage
  # (`${productName}-${version}.${ext}`) and the deb (`${productName}_${version}_${arch}`)
  # rather than relying on electron-builder's implicit default. → NicotinD-<v>-arm64.dmg.
  artifactName: ${productName}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Publishes to the same GitHub Releases the auto-updater (Task 12,
# electron-updater) reads from.
publish:
  provider: github
  owner: kevinch3
  repo: NicotinD
