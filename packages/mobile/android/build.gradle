// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
        // @capacitor/barcode-scanner (QR device-pairing) pulls its native lib
        // `com.github.outsystems:osbarcode-android` from OutSystems' *Azure*
        // public Maven feed (the `com.github.*` group name is misleading — it is
        // NOT on JitPack, Google, or Maven Central). The plugin declares this repo
        // in its own build.gradle, but that block isn't consulted when `:app`
        // resolves its transitive runtime classpath — only these root repos are —
        // so `cap sync` + `assembleRelease` fails resolution without it here
        // (broke the android release job on v0.1.222). Scoped via `includeGroup`
        // so nothing else routes through Azure. Mirrors the plugin's declaration.
        maven {
            url 'https://pkgs.dev.azure.com/OutSystemsRD/9e79bc5b-69b2-4476-9ca5-d67594972a52/_packaging/PublicArtifactRepository/maven/v1'
            name 'OutSystemsAzure'
            content {
                includeGroup 'com.github.outsystems'
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
