
    <div
      class="relative min-h-screen flex items-center justify-center overflow-hidden bg-zinc-950 px-6"
    >
      <!-- Aurora glow: blurred gradient blobs behind the glass card -->
      <div
        class="pointer-events-none absolute -top-32 -left-24 h-96 w-96 rounded-full bg-indigo-600/40 blur-3xl"
      ></div>
      <div
        class="pointer-events-none absolute top-1/3 -right-24 h-96 w-96 rounded-full bg-fuchsia-600/30 blur-3xl"
      ></div>
      <div
        class="pointer-events-none absolute -bottom-32 left-1/4 h-96 w-96 rounded-full bg-teal-500/30 blur-3xl"
      ></div>

      <div
        class="relative z-10 w-full max-w-sm rounded-2xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/40 backdrop-blur-xl"
      >
        <!-- Brand mark -->
        <div class="mb-5 flex justify-center">
          <div
            class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 shadow-lg shadow-indigo-500/40"
          >
            <svg
              class="h-7 w-7 text-white"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M9 17.5a2.5 2.5 0 1 1-2.5-2.5c.45 0 .87.12 1.24.32V6.13a1 1 0 0 1 .76-.97l7-1.75A1 1 0 0 1 17 4.38V14.5a2.5 2.5 0 1 1-2.5-2.5c.45 0 .87.12 1.24.32V8.78l-6 1.5v7.22Z"
              />
            </svg>
          </div>
        </div>

        <h1 class="text-center text-3xl font-bold tracking-tight text-white">NicotinD</h1>
        <p class="mb-8 mt-1 text-center text-sm text-white/50">
          {{ isRegister() ? 'Create an account' : 'Sign in to continue' }}
        </p>

        <form (ngSubmit)="handleSubmit()" class="space-y-4">
          <input
            type="text"
            placeholder="Username"
            [(ngModel)]="username"
            name="username"
            required
            data-testid="login-username"
            class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-white/40 transition focus:border-indigo-400/60 focus:outline-none focus:ring-2 focus:ring-indigo-500/30"
          />
          <app-password-field
            [(ngModel)]="password"
            name="password"
            [placeholder]="'Password'"
            [autocomplete]="'current-password'"
            [required]="true"
            [testId]="'login-password'"
            [inputClass]="'rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-white/40 transition focus:border-indigo-400/60 focus:outline-none focus:ring-2 focus:ring-indigo-500/30'"
          />

          @if (error()) {
            <p class="text-sm text-red-400" data-testid="login-error">{{ error() }}</p>
          }

          <button
            type="submit"
            [disabled]="loading()"
            data-testid="login-submit"
            class="w-full rounded-lg bg-gradient-to-r from-indigo-500 to-fuchsia-500 py-3 font-semibold text-white shadow-lg shadow-indigo-500/30 transition hover:from-indigo-400 hover:to-fuchsia-400 disabled:opacity-50"
          >
            {{ loading() ? '...' : isRegister() ? 'Create Account' : 'Sign In' }}
          </button>
        </form>

        @if (registrationEnabled()) {
          <button
            (click)="toggleMode()"
            data-testid="login-toggle"
            class="mt-5 w-full text-sm text-white/50 transition hover:text-white/80"
          >
            {{ isRegister() ? 'Already have an account? Sign in' : "Don't have an account? Register" }}
          </button>
        }
      </div>
    </div>
