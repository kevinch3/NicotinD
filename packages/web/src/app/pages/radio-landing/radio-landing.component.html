<div class="max-w-3xl mx-auto px-4 py-5 space-y-8" data-testid="radio-landing">
  <!-- Block 1 — Resume your vibe (disappears once tapped) -->
  @if (showResume()) {
    <section data-testid="radio-resume">
      <h2 class="text-lg font-bold text-theme-primary mb-3">Pick up where you left off</h2>
      <button
        type="button"
        (click)="onResume()"
        data-testid="radio-resume-play"
        class="group flex items-center gap-4 w-full p-3 rounded-xl bg-theme-surface/50 hover:bg-theme-surface-2/60 transition text-left"
      >
        <app-cover-art
          [src]="lastTrack()!.coverArt"
          [artist]="lastTrack()!.artist"
          [album]="lastTrack()!.album ?? ''"
          [size]="64"
          rounded="rounded-lg"
        />
        <div class="min-w-0 flex-1">
          <p class="text-xs font-medium text-theme-accent uppercase tracking-wide">Resume radio</p>
          <p class="text-sm font-semibold text-theme-primary truncate">{{ lastTrack()!.title }}</p>
          <p class="text-xs text-theme-muted truncate">{{ lastTrack()!.artist }}</p>
        </div>
        <span
          class="shrink-0 flex items-center justify-center w-12 h-12 rounded-full bg-theme-accent text-theme-on-accent group-active:scale-95 transition"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5v14l11-7z" />
          </svg>
        </span>
      </button>
    </section>
  }

  <!-- Block 2 — Start a new mood -->
  <section data-testid="radio-new-mood">
    <h2 class="text-lg font-bold text-theme-primary mb-1">Start a radio</h2>
    <p class="text-sm text-theme-muted mb-4">Pick a vibe — it starts playing straight away.</p>

    <!-- One-tap vibe presets -->
    <div class="flex flex-wrap gap-2">
      @for (preset of presets; track preset.id) {
        <button
          type="button"
          (click)="startPreset(preset)"
          [disabled]="starting() !== null"
          data-testid="radio-preset"
          [attr.data-preset-id]="preset.id"
          class="flex items-center gap-2 px-4 py-2.5 rounded-full bg-theme-surface-2 text-sm font-medium text-theme-primary hover:bg-theme-accent/15 hover:text-theme-accent transition active:scale-95 disabled:opacity-50"
        >
          <span aria-hidden="true">{{ preset.emoji }}</span>
          {{ preset.label }}
          @if (starting() === preset.id) {
            <span class="w-3 h-3 rounded-full border-2 border-current border-t-transparent animate-spin"></span>
          }
        </button>
      }
    </div>

    <!-- Genre chips (top of the library) -->
    @if (genres().length > 0) {
      <p class="text-xs font-semibold text-theme-muted uppercase tracking-wide mt-5 mb-2">Genres</p>
      <div class="flex flex-wrap gap-2">
        @for (genre of genres(); track genre) {
          <button
            type="button"
            (click)="startGenre(genre)"
            [disabled]="starting() !== null"
            data-testid="radio-genre"
            class="px-4 py-2 rounded-full bg-theme-surface-2/70 text-sm text-theme-secondary hover:bg-theme-accent/15 hover:text-theme-accent transition active:scale-95 disabled:opacity-50"
          >
            {{ genre }}
          </button>
        }
      </div>
    }
  </section>
</div>
