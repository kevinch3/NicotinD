
    <div class="relative">
      <button
        (click)="toggleSwitcher($event)"
        title="Play on a device"
        data-testid="device-switcher-toggle"
        [class]="'w-7 h-7 flex items-center justify-center rounded-full transition ' +
          (isRemoteActive() ? 'text-status-done' : 'text-theme-muted hover:text-theme-secondary')"
      >
        <!-- Cast icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="8" height="10" rx="1" />
          <polygon points="14,5 22,3 22,21 14,19" />
        </svg>
      </button>

      @if (remote.switcherOpen()) {
        <div data-testid="device-switcher-panel" [class]="'absolute right-0 w-64 bg-theme-surface-2 border border-theme rounded-xl shadow-2xl overflow-hidden z-50 ' + (placement() === 'down' ? 'top-10' : 'bottom-10')">
          <div class="px-4 py-3 border-b border-theme">
            <p class="text-xs font-semibold text-theme-secondary uppercase tracking-widest">Play on...</p>
          </div>

          <!-- This device -->
          <div class="border-b border-theme">
            <button
              data-testid="device-option-self"
              [class]="'w-full flex items-center gap-3 px-4 py-2.5 text-sm transition hover:bg-theme-hover ' +
                (isThisDeviceActive() ? 'text-theme-primary' : 'text-theme-secondary')"
              (click)="selectThisDevice()"
            >
              <span class="text-base leading-none">{{ myDeviceEmoji() }}</span>
              <span class="flex-1 text-left truncate">{{ myDeviceName() }}</span>
              <span class="text-[10px] text-theme-muted flex-shrink-0">this device</span>
              @if (isThisDeviceActive()) {
                <span class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0 animate-pulse"></span>
              }
            </button>
          </div>

          <!-- Other remote devices -->
          <ul class="py-1 max-h-52 overflow-y-auto">
            @if (otherDevices().length === 0) {
              <li class="px-4 py-3 text-sm text-theme-muted text-center">No other devices online</li>
            }
            @for (device of otherDevices(); track device.id) {
              <li>
                <button
                  data-testid="device-option"
                  [attr.data-device-id]="device.id"
                  [class]="'w-full flex items-center gap-3 px-4 py-2.5 text-sm transition hover:bg-theme-hover ' +
                    (device.id === remote.activeDeviceId() ? 'text-theme-primary' : 'text-theme-secondary')"
                  (click)="selectDevice(device.id)"
                >
                  <span class="text-base leading-none">{{ getDeviceEmoji(device.name, device.type) }}</span>
                  <span class="flex-1 text-left truncate">{{ device.name }}</span>
                  @if (device.id === remote.activeDeviceId()) {
                    <span data-testid="device-now-playing" class="flex-shrink-0 text-[10px] font-semibold tracking-wide px-1.5 py-0.5 rounded status-done">
                      NOW PLAYING
                    </span>
                  }
                </button>
              </li>
            }
          </ul>

          @if (isRemoteActive() && activeDevice()) {
            <div class="px-4 py-2 border-t border-theme text-xs text-theme-muted truncate">
              Playing on: <span class="text-theme-secondary">{{ activeDevice()!.name }}</span>
            </div>
          }
        </div>
      }
    </div>
