<div class="flex items-center gap-3 mb-4 px-4 py-2 rounded-lg bg-theme-surface-2 text-sm">
  <span class="text-theme-primary font-medium">{{ count() }} selected</span>
  <button type="button" (click)="selectAll.emit()"
    class="text-theme-secondary hover:text-theme-primary transition">
    Select all{{ total() ? ' (' + total() + ')' : '' }}
  </button>
  <button type="button" (click)="add.emit()" [disabled]="count() === 0"
    class="ml-auto px-3 py-1.5 rounded-lg bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 transition disabled:opacity-40 disabled:pointer-events-none">
    Add to playlist
  </button>
  @if (canDelete()) {
    <button type="button" (click)="deleteSelected.emit()" [disabled]="count() === 0"
      class="px-3 py-1.5 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition disabled:opacity-40 disabled:pointer-events-none">
      {{ deleteLabel() }}
    </button>
  }
  <button type="button" (click)="cancel.emit()"
    class="text-theme-muted hover:text-theme-secondary transition">
    Cancel
  </button>
</div>
