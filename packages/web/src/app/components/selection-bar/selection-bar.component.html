<div class="flex items-center gap-3 mb-4 px-4 py-2 rounded-lg bg-theme-surface-2 text-sm">
  <span class="text-theme-primary font-medium">{{ count() }} selected</span>
  <button type="button" (click)="selectAll.emit()"
    class="text-theme-secondary hover:text-theme-primary transition">
    Select all{{ total() ? ' (' + total() + ')' : '' }}
  </button>
  <button type="button" (click)="add.emit()" [disabled]="count() === 0"
    data-testid="selection-add" aria-label="Add to playlist" title="Add to playlist"
    class="ml-auto w-8 h-8 flex items-center justify-center rounded-lg bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 transition disabled:opacity-40 disabled:pointer-events-none">
    <app-icon name="add" [size]="16" />
  </button>
  @if (canDelete()) {
    <button type="button" (click)="deleteSelected.emit()" [disabled]="count() === 0"
      data-testid="selection-delete" [attr.aria-label]="deleteLabel()" [attr.title]="deleteLabel()"
      class="w-8 h-8 flex items-center justify-center rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition disabled:opacity-40 disabled:pointer-events-none">
      <app-icon name="delete" [size]="16" />
    </button>
  }
  <button type="button" (click)="cancel.emit()"
    data-testid="selection-cancel" aria-label="Cancel" title="Cancel"
    class="w-8 h-8 flex items-center justify-center rounded-lg text-theme-muted hover:text-theme-secondary transition">
    <app-icon name="close" [size]="16" />
  </button>
</div>
