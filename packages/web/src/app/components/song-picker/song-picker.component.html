<div class="relative">
  <input type="text" [ngModel]="query()" (ngModelChange)="onQueryChange($event)"
    data-testid="song-picker-input" placeholder="Add a song…"
    class="w-full px-3 py-2 rounded-lg bg-theme-surface-2 text-sm text-theme-primary placeholder:text-theme-muted focus:outline-none" />

  @if (searching()) {
    <p class="text-xs text-theme-muted mt-1">Searching…</p>
  } @else if (query().trim().length >= 2 && results().length === 0) {
    <p class="text-xs text-theme-muted mt-1">No matching songs.</p>
  } @else if (results().length > 0) {
    <div class="mt-1 rounded-lg bg-theme-surface-2 divide-y divide-theme overflow-hidden">
      @for (song of results(); track song.id) {
        <button type="button" (click)="pick(song)" data-testid="song-picker-result"
          class="w-full flex items-center justify-between gap-3 px-3 py-2 text-left hover:bg-theme-hover transition">
          <span class="min-w-0 truncate text-sm text-theme-primary">
            {{ song.title }} <span class="text-theme-muted">— {{ song.artist }}</span>
          </span>
          <span class="text-xs text-theme-muted flex-shrink-0">Add</span>
        </button>
      }
    </div>
  }
</div>
