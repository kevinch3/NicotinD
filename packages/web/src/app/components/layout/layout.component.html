
    <div class="min-h-screen flex flex-col bg-theme-base">
      <!-- Top nav -->
      <!-- pt folds in env(safe-area-inset-top) so the sticky header clears the iOS
           notch/status bar (was sitting under it); = py-3 on web (inset resolves to 0). -->
      <header class="flex items-center justify-between px-4 md:px-6 pb-3 pt-[calc(0.75rem+env(safe-area-inset-top))] border-b border-theme bg-theme-base/80 backdrop-blur-sm sticky top-0 z-40">
        <div class="flex items-center gap-4 md:gap-6">
          <a routerLink="/downloads" class="text-lg font-bold text-theme-primary hover:opacity-80 transition">NicotinD</a>
          <!-- Desktop nav -->
          <nav class="hidden md:flex gap-1">
            @for (item of navItems(); track item.to) {
              @if (isNavDisabled(item.to)) {
                <span class="px-3 py-1.5 rounded-md text-sm font-medium text-theme-muted opacity-40 cursor-not-allowed select-none">
                  {{ item.label }}
                </span>
              } @else {
                <a [routerLink]="item.to" routerLinkActive="bg-theme-surface-2 text-theme-primary"
                  [routerLinkActiveOptions]="{ exact: item.to === '/' }"
                  class="px-3 py-1.5 rounded-md text-sm font-medium transition text-theme-secondary hover:text-theme-primary hover:bg-theme-surface-2/50">
                  {{ item.label }}
                </a>
              }
            }
          </nav>
        </div>

        <div class="flex items-center gap-3">
          <app-download-indicator />
          <span class="hidden md:inline text-xs text-theme-muted/50">v{{ version }}</span>
          <span class="hidden md:inline text-sm text-theme-muted">{{ auth.username() }}</span>
          <button (click)="logout()" data-testid="logout" class="hidden md:inline text-sm text-theme-muted hover:text-theme-secondary transition">Sign out</button>
        </div>
      </header>

      <!-- Offline banner -->
      @if (setup.isOffline()) {
        <div class="flex items-center justify-center gap-2 px-4 py-2 text-xs font-medium bg-amber-500/10 text-amber-400 border-b border-amber-500/20">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
          </svg>
          Offline mode — showing cached content only
        </div>
      }

      <!-- Content — pad bottom so the fixed player + mobile tab bar never cover the last item -->
      <main [class]="'flex-1 ' + mainPadClass()">
        <router-outlet />
      </main>

      <!-- Bottom player -->
      <app-player />

      <!-- Mobile bottom tab bar (md:hidden) — sits below the player -->
      <app-bottom-nav />

      <!-- Now Playing overlay -->
      <app-now-playing />

      <!-- PWA update banner -->
      <app-update-banner />

      <!-- Global "Add to playlist" picker (renders only when invoked) -->
      <app-add-to-playlist />
    </div>
