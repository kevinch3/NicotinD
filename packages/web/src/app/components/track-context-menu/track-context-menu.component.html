
    <div class="fixed inset-0 z-[70]" (click)="close.emit()"></div>
    <div class="fixed z-[80] bg-theme-surface border border-theme rounded-lg shadow-xl py-1 min-w-[180px] max-w-[calc(100vw-1rem)]"
      [style.top.px]="menuPosition().y" [style.left.px]="menuPosition().x">
      <button (click)="searchArtist()" class="w-full text-left px-4 py-2 text-sm text-theme-secondary hover:bg-theme-hover transition">
        Search more by artist
      </button>
      @if (trackId()) {
        <button (click)="showTrackInfo()" class="w-full text-left px-4 py-2 text-sm text-theme-secondary hover:bg-theme-hover transition">
          Track info
        </button>
      }
    </div>
