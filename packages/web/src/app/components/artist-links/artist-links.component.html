@for (seg of segments(); track $index) {
  @if (seg.type === 'link') {
    <a
      [routerLink]="['/library', 'artists', seg.id]"
      class="hover:underline cursor-pointer"
      (click)="$event.stopPropagation(); linkFollowed.emit()"
    >{{ seg.text }}</a>
  } @else {
    <span>{{ seg.text }}</span>
  }
}
