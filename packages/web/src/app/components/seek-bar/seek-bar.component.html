<input
  type="range"
  class="seek-range"
  data-seek
  min="0"
  step="any"
  [attr.aria-label]="ariaLabel()"
  [max]="duration() || 0"
  [value]="value()"
  [disabled]="disabled()"
  [style.--seek-percent]="percent() + '%'"
  [style.--seek-buffered-bg]="bufferedBackground()"
  (input)="onInput($event)"
  (change)="onChange($event)"
/>
