<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NicotinD</title>
    <base href="/" />
    <!-- viewport-fit=cover lets the layout extend under the iOS notch/home
         indicator and makes env(safe-area-inset-*) non-zero so the sticky header
         (top) and the player/bottom-nav (bottom) can pad themselves clear of it.
         No-op on desktop / non-notched screens (insets resolve to 0). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Favicons (brand mark — generated from the manifest icon source by
         scripts/generate-icons.ts). SVG first for crisp high-DPI tabs; PNG and
         .ico fall back for older browsers. -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NicotinD" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script>
      // Apply theme before first paint to avoid flash
      (function () {
        var THEMES = ['midnight', 'daylight', 'warm-paper', 'oled', 'twilight', 'forest', 'eink'];
        try {
          var stored = JSON.parse(localStorage.getItem('nicotind-theme') || '{}');
          var theme = stored.state?.theme || 'midnight';
          var sys = stored.state?.systemTheme;
          if (sys) {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'daylight'
              : 'midnight';
          }
          if (THEMES.indexOf(theme) === -1) theme = 'midnight';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'midnight');
        }
      })();
    </script>
  </head>
  <body style="background-color: var(--theme-bg, #09090b); color: var(--theme-text-primary, #f4f4f5);" class="antialiased">
    <app-root></app-root>
  </body>
</html>
