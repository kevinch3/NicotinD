port: 8484
dataDir: ~/.nicotind
musicDir: /mnt/data1tb_new/music
mode: embedded
registrationEnabled: false
metadataFix:
  enabled: true
  minScore: 85

soulseek:
  username: ''
  password: ''

# Internal service settings (auto-generated passwords if not set)
slskd:
  url: http://localhost:5030
  port: 5030
  username: nicotind

acquire:
  ytdlp:
    enabled: true
    binaryPath: yt-dlp
    format: bestaudio
    extraArgs: []
  spotdl:
    enabled: true
    binaryPath: spotdl
  archive:
    enabled: true
    preferredFormats:
      - MP3
      - FLAC

jwt:
  expiresIn: 24h
