port: 8484
dataDir: ~/.nicotind
musicDir: /mnt/data1tb_new/music
mode: embedded
registrationEnabled: false
metadataFix:
  enabled: true
  minScore: 85

downloads:
  # Standardize lossless downloads (FLAC/WAV/…) on Opus before they enter the
  # library — smaller files + a uniform browser-native codec. Already-lossy files
  # (MP3/AAC) are left untouched. Requires ffmpeg on PATH. Default-on at 192 kbps
  # (transparent headroom since the source lossless file is replaced in place).
  transcodeLossless:
    enabled: true
    format: opus
    bitRate: 192
  # Native auto-acquisition loop: a background poller over Lidarr's wanted/missing
  # list that auto-hunts + downloads monitored albums Lidarr lacks, through the
  # same engine as the interactive hunt. Off by default — it initiates downloads
  # unattended. See docs/auto-acquisition-plan.md.
  autoAcquireEnabled: false
  autoAcquireIntervalMs: 3600000 # sweep Lidarr's missing list hourly
  autoAcquireMaxPerSweep: 3 # cap so a large missing list never floods slskd

soulseek:
  username: ''
  password: ''

# Internal service settings (auto-generated passwords if not set)
slskd:
  url: http://localhost:5030
  port: 5030
  username: nicotind

acquire:
  ytdlp:
    enabled: true
    binaryPath: yt-dlp
    format: bestaudio
    extraArgs: []
    # Netscape cookies.txt for YouTube's "confirm you're not a bot" gate on
    # flagged server IPs. Empty = auto-use <dataDir>/youtube-cookies.txt when
    # that file exists. See docs/download-pipeline.md.
    cookiesFile: ''
  spotdl:
    enabled: true
    binaryPath: spotdl
    cookiesFile: ''
  archive:
    enabled: true
    preferredFormats:
      - MP3
      - FLAC
  spotify:
    # Metadata-only fallback lane (download is spotDL's job). Enable + set
    # credentials in Settings → Plugins, or seed them here / via
    # SPOTIFY_CLIENT_ID + SPOTIFY_CLIENT_SECRET.
    enabled: true
    clientId: ''
    clientSecret: ''

# Audio-analysis sidecar (packages/analysis) — fills mood/valence/danceability/
# acousticness/instrumentalness. Leave empty to run without it (the
# audio-features task just shows as unavailable). In compose this is set via
# NICOTIND_ANALYSIS_URL=http://analysis:8000.
analysis:
  url: ''

jwt:
  # Session length. Tokens are silently renewed on app boot (sliding session),
  # so a long TTL means you stay signed in as long as you open the app within
  # the window — no daily re-login. Accepts any jose duration (e.g. 24h, 30d).
  expiresIn: 30d
