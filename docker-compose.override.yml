# Bind-mount your existing dev data into Docker containers.
# This file is auto-merged with docker-compose.yml by `docker compose up`.
# Remove or rename it to use fresh named volumes instead.
services:
  nicotind:
    volumes:
      - ~/.nicotind:/data/nicotind
      - /mnt/data1tb_new/music:/data/music

  # The analysis sidecar resolves relPaths against ITS OWN /data/music mount —
  # it must see the same files as the API or every /analyze call 404s and the
  # audio-features task never drains (this exact bug shipped once; don't repeat it).
  # GPU=1 swaps in the GPU libtensorflow (Quadro P4000 on this host); the image
  # still falls back to CPU if the GPU is unavailable at runtime.
  analysis:
    build:
      context: packages/analysis
      args:
        GPU: "1"
    volumes:
      - /mnt/data1tb_new/music:/data/music:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  slskd:
    volumes:
      - /mnt/data1tb_new/music:/data/music
      # Don't bind-mount ~/.nicotind/slskd — its config has host-specific paths
      # slskd will use fresh config from docker-compose command args instead
    ports:
      - "5030:5030"

  lidarr:
    volumes:
      - /mnt/data1tb_new/music:/data/music
