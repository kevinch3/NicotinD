name: Build & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect which app artifacts a release actually needs to rebuild, so a trivial
  # backend/core change doesn't fire the expensive per-platform builds (the two
  # macOS jobs bill at ~10x ubuntu). GitHub `paths:` filters don't work for tag
  # pushes, so we diff against the previous release tag ourselves and emit
  # per-area booleans consumed by the app jobs' `if:` below. The server image
  # (`docker`) + `deploy` are NOT gated here — every release publishes a server
  # image and redeploys (deploy waits on docker-merge for the pull).
  #   mobile  (android/ios): wrap packages/web/dist only — NOT the backend.
  #   desktop (desktop-*):   bundle the backend source + web + shell (Variant B).
  changes:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    outputs:
      mobile: ${{ steps.f.outputs.mobile }}
      desktop: ${{ steps.f.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the diff base
      - id: f
        name: Detect changed areas since the previous release tag
        run: |
          set -euo pipefail
          # Previous release by ancestry (robust to version-sort quirks / re-tags).
          prev="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -z "$prev" ]; then
            echo "No previous tag — building all apps (safe default)."
            echo "mobile=true"  >> "$GITHUB_OUTPUT"
            echo "desktop=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "$prev"..HEAD)"
          echo "Changed since $prev:"; echo "$files"
          mob=false; desk=false
          if echo "$files" | grep -qE '^(packages/(web|mobile|capacitor-now-playing)/|package\.json$|bun\.lock$|\.nvmrc$|tsconfig.*\.json$|\.github/workflows/deploy\.yml$)'; then
            mob=true
          fi
          if echo "$files" | grep -qE '^(packages/(web|desktop|api|core|slskd-client|service-manager|lidarr-client)/|src/|config/|package\.json$|bun\.lock$|\.nvmrc$|tsconfig.*\.json$|\.github/workflows/deploy\.yml$)'; then
            desk=true
          fi
          echo "Result: mobile=$mob desktop=$desk"
          echo "mobile=$mob"   >> "$GITHUB_OUTPUT"
          echo "desktop=$desk" >> "$GITHUB_OUTPUT"

  # Set the GitHub Release description to this version's CHANGELOG.md section.
  # NOT gated by `changes` (unlike the app jobs): the release notes must be set
  # for every tagged release, including backend-only ones where mobile/desktop
  # are skipped. softprops/action-gh-release MERGES into the tag's release —
  # setting only `body` here, so it neither clobbers nor is clobbered by the
  # asset-upload steps (which pass no `body`), regardless of job ordering.
  release-notes:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Extract the `## [<version>] …` section (up to the next version heading)
      # from CHANGELOG.md — the file commit-and-tag-version regenerates on each
      # `bun run release`, checked out here at the tag so it includes this version.
      - name: Extract changelog section
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture=1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          # Fallback for a release with no changelog-visible commits (chore/refactor
          # only): an empty body would read as a broken release page.
          if [ ! -s release-notes.md ] || ! grep -q '[^[:space:]]' release-notes.md; then
            printf 'Maintenance release. See the commit history for details.\n' > release-notes.md
          fi
          echo "----- release notes -----"; cat release-notes.md

      - name: Set the GitHub Release description
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md

  # Build and sign the Android APK and attach it to the GitHub Release. Runs in
  # parallel with `deploy`; a failure here (e.g. missing signing secrets) does not 
  # block the server deploy. Requires repo secrets: ANDROID_KEYSTORE_BASE64, 
  # ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD. 
  # See docs/mobile-app.md "Release & signing".
  android:
    runs-on: ubuntu-latest
    # Only on a tag push: these jobs attach assets to the tag's GitHub Release (none
    # exists for a manual dispatch). NOT continue-on-error: a genuine packaging break
    # (unresolved dependency/repo, manifest-merge failure, bad signing) must turn the
    # release run RED so it's caught — not silently ship a release with no APK, as the
    # osbarcode-repo + minSdk breakage did across v0.1.222. It still never blocks the
    # server `deploy` job, which runs in parallel with no `needs` linkage to this one.
    # Skipped when the mobile inputs didn't change this release (see `changes`).
    needs: [changes]
    if: github.ref_type == 'tag' && needs.changes.outputs.mobile == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ng build (web) requires Node >= 22.22.3; pin from .nvmrc.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # Capacitor 6 targets JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      # Capacitor copies this build into the Android assets on `cap sync`.
      - name: Build web
        run: bun run --filter @nicotind/web build

      - name: Sync Capacitor Android project
        run: bunx cap sync android
        working-directory: packages/mobile

      # versionName/versionCode for gradle, derived from the monorepo version.
      - name: Derive Android version
        run: bun run packages/mobile/scripts/android-env.ts >> "$GITHUB_ENV"

      # Decode the keystore only when the secret is present, so the build fails
      # loudly (unsigned, no matching APK) rather than on a bogus empty keystore.
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building an unsigned APK."
          fi

      - name: Build release APK
        working-directory: packages/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # Gradle emits a bare `app-release.apk`; rename it to the versioned,
      # product-named scheme the other release assets use (NicotinD-<version>.apk)
      # via $NICOTIND_VERSION_NAME (already in $GITHUB_ENV from "Derive Android version").
      - name: Rename APK with version
        working-directory: packages/mobile/android/app/build/outputs/apk/release
        run: mv app-release.apk "NicotinD-${NICOTIND_VERSION_NAME}.apk"

      - name: Attach APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/mobile/android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true

  # Build an UNSIGNED iOS .ipa and attach it to the GitHub Release.
  # The native `ios/` project is NOT committed (it must be generated on a Mac), 
  # so CI generates it ephemerally each run and patches Info.plist via a script. 
  # A failure here does not block the server deploy. See docs/ios-app.md.
  ios:
    runs-on: macos-14
    # Tag-only; NOT continue-on-error — same fail-loud rationale as the `android`
    # job above (parallel with `deploy`, no `needs` linkage, so it never blocks it).
    # Skipped when the mobile inputs didn't change this release (see `changes`).
    needs: [changes]
    if: github.ref_type == 'tag' && needs.changes.outputs.mobile == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ng build (web) requires Node >= 22.22.3; pin from .nvmrc.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      # Capacitor copies this build into the iOS app on `cap sync`.
      - name: Build web
        run: bun run --filter @nicotind/web build

      # ios/ is not committed (needs a Mac to generate); create it ephemerally.
      # `cap add ios` is a no-op if it somehow already exists.
      - name: Generate + sync iOS project
        working-directory: packages/mobile
        run: |
          bunx cap add ios || true
          bunx cap sync ios

      # The ios/ project is ephemeral, so its AppIcon + splash are the default
      # Capacitor mark — regenerate the branded AppIcon and splash screen from the
      # committed assets/ sources (the same brand mark as the Android assets + PWA
      # manifest). Android assets are committed, so only iOS needs this in CI.
      - name: Generate branded iOS app icon + splash
        working-directory: packages/mobile
        run: bunx @capacitor/assets@3 generate --ios

      # CFBundleShortVersionString/CFBundleVersion, derived from the monorepo
      # version (same scheme as Android), consumed by the Info.plist patch below.
      - name: Derive iOS version
        run: bun run packages/mobile/scripts/ios-env.ts >> "$GITHUB_ENV"

      # Inject UIBackgroundModes: [audio] (background playback) + the version
      # keys into the generated Info.plist (there is no committed one to edit).
      - name: Patch Info.plist
        run: bun run packages/mobile/scripts/ios-plist.ts

      - name: Build unsigned .app and package .ipa
        working-directory: packages/mobile/ios/App
        run: |
          set -euo pipefail
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/App.app Payload/
          # Versioned, product-named scheme matching the other release assets
          # (NicotinD-<version>-unsigned.ipa); $NICOTIND_IOS_SHORT_VERSION is
          # already in $GITHUB_ENV from the "Derive iOS version" step above.
          zip -r "NicotinD-${NICOTIND_IOS_SHORT_VERSION}-unsigned.ipa" Payload

      - name: Attach unsigned IPA to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/mobile/ios/App/NicotinD-*-unsigned.ipa
          fail_on_unmatched_files: true

  # Build the Linux desktop app (AppImage + deb) via electron-builder and
  # publish it — together with electron-updater's `latest-linux.yml` feed
  # metadata — to the tag's GitHub Release. `--publish always` is required
  # (not a manual softprops upload of just the AppImage/deb): electron-updater
  # (Task 12) polls `latest-linux.yml`, which only electron-builder's own
  # publish step generates and uploads. Tag-only; NOT continue-on-error — same
  # fail-loud rationale as android/ios above: a broken deb/AppImage must turn the
  # run red (e.g. the scoped-name deb bug that silently shipped no Linux artifacts),
  # yet it still never blocks `deploy`, which runs in parallel with no `needs` link.
  desktop-linux:
    runs-on: ubuntu-latest
    # Skipped when the desktop inputs didn't change this release (see `changes`).
    needs: [changes]
    if: github.ref_type == 'tag' && needs.changes.outputs.desktop == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # electron-builder itself (and ng build for the web bundle it stages)
      # wants Node >= 22.22.3; pin from .nvmrc, same as android/ios.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      - name: Build desktop main/preload
        run: bun run --filter @nicotind/desktop build

      # Stages the web build, bun/ffmpeg binaries, and backend entry into
      # packages/desktop/resources/ per electron-builder.yml's extraResources
      # contract (see that file's header comment).
      - name: Stage desktop resources
        run: bun run --filter @nicotind/desktop prepare-resources

      - name: Package + publish Linux desktop app
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # electron-builder is a Node CLI and crashes under Bun's runtime
        # (`--bun`) via source-map-support; run it under Node (setup-node above).
        # Override the desktop package version (static 0.1.0) with the release
        # version from the tag (v0.1.207 -> 0.1.207) so artifacts are versioned
        # correctly AND electron-builder publishes to THIS release instead of
        # creating a stray `v0.1.0` one.
        run: bunx electron-builder --linux --publish always -c.extraMetadata.version="${GITHUB_REF_NAME#v}"

  # Build the macOS desktop app (dmg, arm64 only — Intel/x64 dropped) and publish
  # it the same way (electron-updater reads `latest-mac.yml`). Ad-hoc signed — no
  # Apple Developer ID in scope for v1, so electron-builder.yml leaves `identity`
  # UNSET (never `identity: null`, which would re-break arm64);
  # CSC_IDENTITY_AUTO_DISCOVERY=false stops electron-builder from probing the
  # runner's keychain for a signing identity to auto-use.
  desktop-mac:
    runs-on: macos-14
    # Skipped when the desktop inputs didn't change this release (see `changes`).
    # NOT continue-on-error — see desktop-linux above for the fail-loud rationale.
    needs: [changes]
    if: github.ref_type == 'tag' && needs.changes.outputs.desktop == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      - name: Build desktop main/preload
        run: bun run --filter @nicotind/desktop build

      - name: Stage desktop resources
        run: bun run --filter @nicotind/desktop prepare-resources

      - name: Package + publish macOS desktop app
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        # Run electron-builder under Node, not Bun (`--bun` crashes it).
        # extraMetadata.version: use the release tag's version (see desktop-linux).
        run: bunx electron-builder --mac --publish always -c.extraMetadata.version="${GITHUB_REF_NAME#v}"

  # Build + publish the multi-arch server image to GHCR (Immich-style): one
  # native-runner build per arch pushed by digest, then `docker-merge` stitches
  # the digests into a single tagged manifest. Native arm64 runners (free for
  # public repos) instead of QEMU — Bun's JIT is unreliable under emulation.
  # Tag-only: a workflow_dispatch deploy reuses the last published `release`
  # image rather than publishing from an untagged master tip.
  docker:
    runs-on: ${{ matrix.runner }}
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      IMAGE: ghcr.io/kevinch3/nicotind
    steps:
      - uses: actions/checkout@v4

      # linux/amd64 -> linux-amd64, for artifact names + cache scopes.
      - name: Prepare platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push by digest (no tag): tagging happens once in docker-merge, so a
      # half-published release can never move the `release`/version tags.
      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=docker-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge the per-arch digests into one multi-arch manifest, tagged:
  #   vX.Y.Z  — exact release (pin this to hold/rollback a version)
  #   vX      — major metatag (Immich-style; excludes nothing today at v0)
  #   release — stable metatag, the docker-compose.yml default
  # Deliberately NO `latest` tag: `release` is the explicit equivalent, and it
  # never points at an untagged build.
  docker-merge:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref_type == 'tag'
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/kevinch3/nicotind
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}" # vX.Y.Z
          major="${version%%.*}"       # vX
          refs=()
          for d in *; do refs+=("$IMAGE@sha256:$d"); done
          docker buildx imagetools create \
            -t "$IMAGE:$version" -t "$IMAGE:$major" -t "$IMAGE:release" \
            "${refs[@]}"

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "$IMAGE:${GITHUB_REF_NAME}"

  # Publish the analysis sidecar image (amd64 only: essentia-tensorflow ships
  # x86_64-only wheels, so an arm64 build has never been possible). Single-arch
  # → no digest/merge dance, tags pushed directly. Same tag semantics as the
  # server image.
  docker-analysis:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/kevinch3/nicotind-analysis
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}" # vX.Y.Z
          major="${version%%.*}"       # vX
          echo "tags=${IMAGE}:${version},${IMAGE}:${major},${IMAGE}:release" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: packages/analysis
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=analysis-linux-amd64
          cache-to: type=gha,mode=max,scope=analysis-linux-amd64

  deploy:
    runs-on: ubuntu-latest
    # On a tag push the host pulls the images the docker jobs just published,
    # so deploy must wait for them. On workflow_dispatch the docker jobs are
    # skipped and the host redeploys the current `release` images (NOT master
    # source — the compose file's `image:` defaults; build-from-source now
    # lives in an override file).
    needs: [docker-merge, docker-analysis]
    if: ${{ !cancelled() && (needs.docker-merge.result == 'success' || needs.docker-merge.result == 'skipped') && (needs.docker-analysis.result == 'success' || needs.docker-analysis.result == 'skipped') }}
    steps:
      # Resolve exactly what the server should check out. On a tag push (the normal
      # release path) deploy that exact tag; on a manual workflow_dispatch deploy the
      # remote tip of master. NOTE: `github.ref_name` is never empty, so a bare
      # `${{ github.ref_name || 'origin/master' }}` would resolve to the (stale, local)
      # branch name on dispatch — hence the explicit branch here.
      - name: Resolve deploy ref
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/master" >> "$GITHUB_OUTPUT"
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Pin the deploy host's SSH key into known_hosts so we can drop the
      # insecure `-o StrictHostKeyChecking=no` (which accepts any key on
      # first connect, vulnerable to MITM). `ssh-keyscan` runs at workflow
      # start over the Tailscale network, so the key is fetched from the
      # genuine host. If the host's SSH key changes (reinstall/reprovision),
      # ssh-keyscan will pick up the new key automatically — no manual secret
      # rotation needed. This is strictly safer than the old flag.
      - name: Pin deploy host SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            set -e
            if systemctl --user is-active --quiet nicotind; then
              echo "ERROR: systemd nicotind is active on the host — Docker deploy would collide on :5030/:8484. Run: systemctl --user disable --now nicotind" >&2
              exit 1
            fi
            cd ~/Documents/nicotind &&
            # --force: the deploy host is a pure mirror of origin, but its local clone
            # had a divergent tag (v0.1.26) that made a plain `fetch --tags` exit 1 with
            # "would clobber existing tag", aborting the deploy. Force tags to match
            # origin so a stale local tag can never block a release again.
            git fetch --force --tags origin master &&
            git reset --hard ${{ steps.ref.outputs.ref }} &&
            # Pull the published images (the docker jobs just moved `release`
            # to this tag). --build is kept for any host-local override that
            # still carries a `build:` key (no-op otherwise). Requires the
            # GHCR packages to be public or a `docker login ghcr.io` on the
            # host — see docs/deployment.md.
            docker compose pull nicotind analysis &&
            docker compose up --build -d
          '
