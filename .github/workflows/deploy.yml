name: Build & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.sha }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and sign the Android APK and attach it to the GitHub Release. Runs in
  # parallel with `deploy`; a failure here (e.g. missing signing secrets) does not 
  # block the server deploy. Requires repo secrets: ANDROID_KEYSTORE_BASE64, 
  # ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD. 
  # See docs/mobile-app.md "Release & signing".
  android:
    runs-on: ubuntu-latest
    # Only on a tag push: these jobs attach assets to the tag's GitHub Release (none
    # exists for a manual dispatch). Best-effort — a flaky/unsigned mobile build must
    # not mark the run red when the server `deploy` job below succeeded.
    if: github.ref_type == 'tag'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ng build (web) requires Node >= 22.22.3; pin from .nvmrc.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # Capacitor 6 targets JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      # Capacitor copies this build into the Android assets on `cap sync`.
      - name: Build web
        run: bun run --filter @nicotind/web build

      - name: Sync Capacitor Android project
        run: bunx cap sync android
        working-directory: packages/mobile

      # versionName/versionCode for gradle, derived from the monorepo version.
      - name: Derive Android version
        run: bun run packages/mobile/scripts/android-env.ts >> "$GITHUB_ENV"

      # Decode the keystore only when the secret is present, so the build fails
      # loudly (unsigned, no matching APK) rather than on a bogus empty keystore.
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building an unsigned APK."
          fi

      - name: Build release APK
        working-directory: packages/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Attach APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/mobile/android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true

  # Build an UNSIGNED iOS .ipa and attach it to the GitHub Release.
  # The native `ios/` project is NOT committed (it must be generated on a Mac), 
  # so CI generates it ephemerally each run and patches Info.plist via a script. 
  # A failure here does not block the server deploy. See docs/ios-app.md.
  ios:
    runs-on: macos-14
    # Tag-only + best-effort, same rationale as the `android` job above.
    if: github.ref_type == 'tag'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ng build (web) requires Node >= 22.22.3; pin from .nvmrc.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      # Capacitor copies this build into the iOS app on `cap sync`.
      - name: Build web
        run: bun run --filter @nicotind/web build

      # ios/ is not committed (needs a Mac to generate); create it ephemerally.
      # `cap add ios` is a no-op if it somehow already exists.
      - name: Generate + sync iOS project
        working-directory: packages/mobile
        run: |
          bunx cap add ios || true
          bunx cap sync ios

      # The ios/ project is ephemeral, so its AppIcon + splash are the default
      # Capacitor mark — regenerate the branded AppIcon and splash screen from the
      # committed assets/ sources (the same brand mark as the Android assets + PWA
      # manifest). Android assets are committed, so only iOS needs this in CI.
      - name: Generate branded iOS app icon + splash
        working-directory: packages/mobile
        run: bunx @capacitor/assets@3 generate --ios

      # CFBundleShortVersionString/CFBundleVersion, derived from the monorepo
      # version (same scheme as Android), consumed by the Info.plist patch below.
      - name: Derive iOS version
        run: bun run packages/mobile/scripts/ios-env.ts >> "$GITHUB_ENV"

      # Inject UIBackgroundModes: [audio] (background playback) + the version
      # keys into the generated Info.plist (there is no committed one to edit).
      - name: Patch Info.plist
        run: bun run packages/mobile/scripts/ios-plist.ts

      - name: Build unsigned .app and package .ipa
        working-directory: packages/mobile/ios/App
        run: |
          set -euo pipefail
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r NicotinD-unsigned.ipa Payload

      - name: Attach unsigned IPA to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/mobile/ios/App/NicotinD-unsigned.ipa
          fail_on_unmatched_files: true

  # Build the Linux desktop app (AppImage + deb) via electron-builder and
  # publish it — together with electron-updater's `latest-linux.yml` feed
  # metadata — to the tag's GitHub Release. `--publish always` is required
  # (not a manual softprops upload of just the AppImage/deb): electron-updater
  # (Task 12) polls `latest-linux.yml`, which only electron-builder's own
  # publish step generates and uploads. Same tag-only + best-effort rationale
  # as android/ios above — a packaging failure here must not block `deploy`.
  desktop-linux:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # electron-builder itself (and ng build for the web bundle it stages)
      # wants Node >= 22.22.3; pin from .nvmrc, same as android/ios.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      - name: Build desktop main/preload
        run: bun run --filter @nicotind/desktop build

      # Stages the web build, bun/ffmpeg binaries, and backend entry into
      # packages/desktop/resources/ per electron-builder.yml's extraResources
      # contract (see that file's header comment).
      - name: Stage desktop resources
        run: bun run --filter @nicotind/desktop prepare-resources

      - name: Package + publish Linux desktop app
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx --bun electron-builder --linux --publish always

  # Build the macOS desktop app (dmg, x64+arm64) and publish it the same way
  # (electron-updater reads `latest-mac.yml`). Unsigned — no Apple Developer
  # ID in scope for v1 (electron-builder.yml already sets `identity: null`);
  # CSC_IDENTITY_AUTO_DISCOVERY=false stops electron-builder from probing the
  # runner's keychain for a signing identity to auto-use.
  desktop-mac:
    runs-on: macos-14
    if: github.ref_type == 'tag'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      - name: Build desktop main/preload
        run: bun run --filter @nicotind/desktop build

      - name: Stage desktop resources
        run: bun run --filter @nicotind/desktop prepare-resources

      - name: Package + publish macOS desktop app
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: bunx --bun electron-builder --mac --publish always

  deploy:
    runs-on: ubuntu-latest
    steps:
      # Resolve exactly what the server should check out. On a tag push (the normal
      # release path) deploy that exact tag; on a manual workflow_dispatch deploy the
      # remote tip of master. NOTE: `github.ref_name` is never empty, so a bare
      # `${{ github.ref_name || 'origin/master' }}` would resolve to the (stale, local)
      # branch name on dispatch — hence the explicit branch here.
      - name: Resolve deploy ref
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/master" >> "$GITHUB_OUTPUT"
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Pin the deploy host's SSH key into known_hosts so we can drop the
      # insecure `-o StrictHostKeyChecking=no` (which accepts any key on
      # first connect, vulnerable to MITM). `ssh-keyscan` runs at workflow
      # start over the Tailscale network, so the key is fetched from the
      # genuine host. If the host's SSH key changes (reinstall/reprovision),
      # ssh-keyscan will pick up the new key automatically — no manual secret
      # rotation needed. This is strictly safer than the old flag.
      - name: Pin deploy host SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            set -e
            if systemctl --user is-active --quiet nicotind; then
              echo "ERROR: systemd nicotind is active on the host — Docker deploy would collide on :5030/:8484. Run: systemctl --user disable --now nicotind" >&2
              exit 1
            fi
            cd ~/Documents/nicotind &&
            # --force: the deploy host is a pure mirror of origin, but its local clone
            # had a divergent tag (v0.1.26) that made a plain `fetch --tags` exit 1 with
            # "would clobber existing tag", aborting the deploy. Force tags to match
            # origin so a stale local tag can never block a release again.
            git fetch --force --tags origin master &&
            git reset --hard ${{ steps.ref.outputs.ref }} &&
            docker compose up --build -d
          '
