name: CI & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Statically validate the workflow files themselves. A malformed `${{ }}`
      # expression (e.g. a double-quoted string literal) makes a workflow invalid and
      # fails it at startup with zero jobs — invisible until a deploy silently never
      # runs. actionlint turns that into a failed PR check here instead. We download
      # the pinned binary directly rather than use a wrapper action: the popular ones
      # run `npm install` in the repo root, which chokes on this Bun workspace's
      # `workspace:*` deps (EUNSUPPORTEDPROTOCOL). shellcheck is preinstalled on the
      # runner, so actionlint lints inline `run:` scripts too.
      - name: Lint GitHub Actions workflows
        run: |
          set -euo pipefail
          version=1.7.12
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          ./actionlint -color

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test (API + slskd-client + lidarr-client + core + service-manager + mobile)
        run: bun test packages/api/src packages/slskd-client/src packages/lidarr-client/src packages/core/src packages/service-manager/src packages/mobile/src packages/desktop/electron packages/desktop/scripts

      - name: Test (e2e playground helpers)
        run: bun test packages/e2e/playground

      - name: Test (web)
        run: bun run --filter @nicotind/web test

      - name: Build (web)
        run: bun run --filter @nicotind/web build

  # Analysis sidecar (packages/analysis): contract + pure-function tests against
  # a fake model registry — no TensorFlow/Essentia download in CI. The gated
  # golden tests (real models) auto-skip without ANALYSIS_MODELS_DIR.
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install (dev extras only)
        run: pip install -e './packages/analysis[dev]'

      - name: Lint (ruff)
        run: ruff check packages/analysis/app packages/analysis/tests

      - name: Test (pytest)
        run: pytest packages/analysis/tests -q

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Build (web)
        run: bun run --filter @nicotind/web build

      - name: Run e2e
        run: bun run --filter @nicotind/e2e test
        env:
          CI: '1'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  # Packaged-boot smoke test (Task 13): launches the real Electron app via
  # Playwright's `_electron` and asserts the window loads + the sidecar
  # backend answers. Best-effort — `_electron` + a headless Linux display is
  # heavier/flakier than the browser-driven `e2e` job above, so it must not
  # block `release`. NOT in `needs` below for the same reason.
  desktop-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install

      # The smoke test's sidecar boots in dev mode straight off
      # packages/web/dist (see electron/paths.ts) — no packaged resources/
      # staging needed, just the raw web build.
      - name: Build web
        run: bun run --filter @nicotind/web build

      - name: Build desktop main/preload
        run: bun run --filter @nicotind/desktop build

      # Playwright's `--with-deps` pulls the OS shared libraries Electron's
      # bundled Chromium also needs (libnss3, libatk, …). We deliberately do
      # NOT probe with `electron --version`: that *launches* the Electron
      # binary, which aborts on a GitHub runner because Chromium's SUID
      # sandbox helper isn't root-owned. The binary itself is already present
      # (electron's postinstall ran during `bun install`); the smoke test
      # launches it with `--no-sandbox` in CI (see smoke.spec.ts).
      - name: Install Playwright OS deps
        run: bunx playwright install --with-deps chromium
        working-directory: packages/desktop

      - name: Run desktop smoke test
        run: xvfb-run -a bun run --filter @nicotind/desktop test:smoke
        env:
          CI: '1'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-report
          path: packages/desktop/playwright-report/
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [ci, e2e, analysis]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/master' && !startsWith(github.event.head_commit.message, 'chore(release):')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release (idempotent bump, tag, push)
        run: |
          set -euo pipefail
          version="$(bunx commit-and-tag-version --dry-run 2>&1 \
            | grep -oP 'tagging release v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
          if [ -z "$version" ]; then
            echo "Could not determine next version from dry-run output" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "Tag v$version already exists — release already published, skipping."
            exit 0
          fi
          bun run release
          git push --follow-tags origin master
