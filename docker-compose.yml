services:
  nicotind:
    build: .
    user: "1000:1000"
    group_add:
      - "981"
    ports:
      - "8484:8484"
    volumes:
      - nicotind-data:/data/nicotind
      - music:/data/music
      - tailscale-sock:/var/run/tailscale
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NICOTIND_MODE: external
      NICOTIND_PORT: "8484"
      NICOTIND_DATA_DIR: /data/nicotind
      NICOTIND_MUSIC_DIR: /data/music
      NICOTIND_SLSKD_URL: http://slskd:5030
      NICOTIND_NAVIDROME_URL: http://navidrome:4533
      SLSKD_USERNAME: slskd
      SLSKD_PASSWORD: slskd
      TAILSCALE_SOCKET: /var/run/tailscale/tailscaled.sock
      NICOTIND_LIDARR_URL: http://lidarr:8686
      LIDARR_API_KEY: nicotind-lidarr-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8484/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      navidrome:
        condition: service_started
      slskd:
        condition: service_started
      lidarr:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  slskd:
    image: slskd/slskd:0.25.1
    user: "1000:1000"
    volumes:
      - music:/data/music
      - slskd-data:/app
      - ./scripts/slskd-entrypoint.sh:/slskd-entrypoint.sh:ro
    entrypoint: ["/slskd-entrypoint.sh"]
    command:
      - --remote-configuration=true
      - --http-port=5030
      - --no-https=true
      - --slsk-listen-port=50300
      - --username=slskd
      - --password=slskd
      - --downloads=/data/music
    environment:
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_HTTP_PORT: "5030"
      SLSKD_NO_HTTPS: "true"
      SLSKD_SLSK_LISTEN_PORT: "50300"
      SLSKD_USERNAME: slskd
      SLSKD_PASSWORD: slskd
      SLSKD_DIRECTORIES__INCOMPLETE: /app/incomplete
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5030/api/v0/application"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:latest
    user: "1000:1000"
    volumes:
      - music:/data/music:ro
      - navidrome-data:/data/nd
    environment:
      ND_MUSICFOLDER: /data/music
      ND_DATAFOLDER: /data/nd
      ND_PORT: "4533"
      ND_BASEURL: ""
      # Group albums by artist+name, NOT by musicbrainz_albumid/releasedate (the
      # default). Hunt/fallback can drop foreign-edition files (deluxe, bonus,
      # acoustic) carrying their own MBID into a single <Artist>/<Album> folder;
      # the default PID then splits that one folder into a card per MBID. Keying
      # on albumartistid+album makes one folder = one album card. See CLAUDE.md.
      ND_PID_ALBUM: albumartistid,album
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4533/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  lidarr:
    image: linuxserver/lidarr:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      LIDARR__AUTH__APIKEY: nicotind-lidarr-internal
    volumes:
      - lidarr-config:/config
      - music:/data/music
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:8686/api/v1/system/status
        - -H
        - "X-Api-Key: nicotind-lidarr-internal"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_USERSPACE: "true"
      TS_STATE_DIR: /var/lib/tailscale
      TS_SOCKET: /var/run/tailscale/tailscaled.sock
      TS_HOSTNAME: nicotind
    network_mode: service:nicotind
    depends_on:
      - nicotind
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  nicotind-data:
  music:
  slskd-data:
  navidrome-data:
  tailscale-state:
  tailscale-sock:
  lidarr-config:
