services:
  nicotind:
    build: .
    user: "1000:1000"
    group_add:
      - "981"
    ports:
      - "8484:8484"
    volumes:
      - nicotind-data:/data/nicotind
      - music:/data/music
      # SECURITY: bind-mounting /var/run/docker.sock grants the `nicotind`
      # container full Docker API access = host-root-equivalent privilege.
      # Required for the admin log-streaming feature (packages/api/src/routes/
      # system.ts). The container runs as UID 1000 but this does not mitigate
      # socket access. Remove this bind mount unless you need log streaming.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NICOTIND_MODE: external
      NICOTIND_PORT: "8484"
      NICOTIND_DATA_DIR: /data/nicotind
      NICOTIND_MUSIC_DIR: /data/music
      NICOTIND_SLSKD_URL: http://slskd:5030
      SLSKD_USERNAME: slskd
      SLSKD_PASSWORD: slskd
      NICOTIND_LIDARR_URL: http://lidarr:8686
      LIDARR_API_KEY: nicotind-lidarr-internal
      NICOTIND_ANALYSIS_URL: http://analysis:8000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8484/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      slskd:
        condition: service_started
      lidarr:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  slskd:
    image: slskd/slskd:0.25.1
    user: "1000:1000"
    volumes:
      - music:/data/music
      - slskd-data:/app
      - ./scripts/slskd-entrypoint.sh:/slskd-entrypoint.sh:ro
    entrypoint: ["/slskd-entrypoint.sh"]
    command:
      - --remote-configuration=true
      - --http-port=5030
      - --no-https=true
      - --slsk-listen-port=50300
      - --username=slskd
      - --password=slskd
      - --downloads=/data/music
    environment:
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_HTTP_PORT: "5030"
      SLSKD_NO_HTTPS: "true"
      SLSKD_SLSK_LISTEN_PORT: "50300"
      SLSKD_USERNAME: slskd
      SLSKD_PASSWORD: slskd
      SLSKD_DIRECTORIES__INCOMPLETE: /app/incomplete
    healthcheck:
      # why: the slskd image ships no curl/wget, so a curl-based check fails at
      # exec time and marks the container permanently unhealthy; bash /dev/tcp
      # needs no extra binaries. /health is slskd's unauthenticated probe.
      test:
        - CMD
        - bash
        - -c
        - exec 3<>/dev/tcp/localhost/5030 && printf 'GET /health HTTP/1.0\r\n\r\n' >&3 && grep -q '200 OK' <&3
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # Audio-analysis sidecar (Essentia embeddings + tagging heads). The API has NO
  # depends_on for it — everything degrades gracefully when the sidecar is down;
  # only the audio-features enrichment task pauses.
  analysis:
    build: packages/analysis
    user: "1000:1000"
    volumes:
      - music:/data/music:ro
    environment:
      MUSIC_DIR: /data/music
    # GPU inference (optional, ~10x faster embeddings; needs the NVIDIA
    # container toolkit on the host). The GPU image keeps full CPU fallback —
    # started without a GPU it silently runs on CPU — so enabling is safe.
    # Uncomment here or in an override file (see docs/audio-ml-enrichment.md):
    # build:
    #   context: packages/analysis
    #   args:
    #     GPU: "1"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - internal
    restart: unless-stopped

  lidarr:
    image: linuxserver/lidarr:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      LIDARR__AUTH__APIKEY: nicotind-lidarr-internal
    volumes:
      - lidarr-config:/config
      - music:/data/music
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:8686/api/v1/system/status
        - -H
        - "X-Api-Key: nicotind-lidarr-internal"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  nicotind-data:
  music:
  slskd-data:
  lidarr-config:
